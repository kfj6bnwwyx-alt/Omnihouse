name: Daily job search for Simona

on:
  schedule:
    # 09:00 America/New_York. Cron is UTC, so 13:00 UTC during EDT (Mar-Nov)
    # and 14:00 UTC during EST. Pick one; the off-hours difference is harmless.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: scripts/job-search
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run daily job search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          JOBS_TAB_NAME: ${{ vars.JOBS_TAB_NAME }}
          SKIP_LIST_TAB_NAME: ${{ vars.SKIP_LIST_TAB_NAME }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GMAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.GMAIL_OAUTH_REFRESH_TOKEN }}
        run: npm start
