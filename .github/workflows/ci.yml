name: CI

# Runs on every push to main and on PRs. Keeps the feedback loop
# tight — a regression that slips past local checks shows up here
# within a few minutes instead of the next time someone reads the
# "Actions" tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel older runs on the same branch — only the latest commit's
  # result matters, and it saves macOS minutes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select Xcode 17 if available
        # Defensive — macos-15 ships with Xcode 17 already, but pin
        # to the right developer dir in case multiple are installed.
        run: sudo xcode-select -s /Applications/Xcode_17.0.app/Contents/Developer || true

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          xcodebuild \
            -project "house connect.xcodeproj" \
            -scheme "house connect" \
            -resolvePackageDependencies

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild \
            -project "house connect.xcodeproj" \
            -scheme "house connect" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        # Tests run against a concrete simulator runtime. Picks an
        # iPhone iOS 26 destination from xcodebuild itself so we
        # only ever use a destination the project accepts.
        #
        # NOTE: no CODE_SIGNING_ALLOWED=NO — KeychainTokenStoreTests
        # requires the keychain entitlement which disabled signing
        # strips. GitHub-hosted macOS runners have the default dev
        # certificate needed for test-scope signing.
        run: |
          set -euo pipefail
          SIM_ID=$(xcodebuild \
            -project "house connect.xcodeproj" \
            -scheme "house connect" \
            -showdestinations 2>/dev/null | \
            grep -E 'platform:iOS Simulator.*OS:26.*name:iPhone' | head -1 | \
            sed -n 's/.*id:\([-0-9A-F]\{36\}\).*/\1/p')
          if [ -z "$SIM_ID" ]; then
            echo "::error::No iOS 26 iPhone simulator destination available"
            xcodebuild -project "house connect.xcodeproj" -scheme "house connect" -showdestinations
            exit 1
          fi
          echo "Using simulator: $SIM_ID"
          xcodebuild \
            -project "house connect.xcodeproj" \
            -scheme "house connect" \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            test \
            -resultBundlePath /tmp/TestResult.xcresult

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: /tmp/TestResult.xcresult
